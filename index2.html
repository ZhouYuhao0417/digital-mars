<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PersExplorer — Mars Rover Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050509;--sf:#0c0c16;--sf2:#141422;--bd:rgba(196,90,44,0.12);--tx:#e2e8f0;--tx2:#94a3b8;--tx3:#64748b;--ms:#c45a2c;--ms2:#e8934a;--cy:#22d3ee;--em:#34d399;--am:#fbbf24;--ac:#818cf8;--rd:10px}
html{font-size:15px}body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);overflow-x:hidden}
.app{max-width:1440px;margin:0 auto;padding:12px}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 0 14px;border-bottom:1px solid var(--bd);margin-bottom:12px;flex-wrap:wrap;gap:6px}
.logo{font-family:'Space Grotesk',sans-serif;font-size:21px;font-weight:700;display:flex;align-items:center;gap:8px}
.logo-d{width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#e8934a,#8b3a1a);box-shadow:0 0 10px rgba(232,121,59,0.3)}
.bdg{font-size:10px;padding:2px 8px;border-radius:100px;border:1px solid var(--bd);color:var(--ms2);background:rgba(232,147,74,0.08)}
.hs{display:flex;gap:16px;font-size:11px;color:var(--tx3);font-family:'Space Grotesk'}.hs strong{color:var(--ms2)}
.top{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px}
.st{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rd);padding:10px;text-align:center}
.sv{font-family:'Space Grotesk';font-size:20px;font-weight:700}.sl{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.mg{display:grid;grid-template-columns:1fr 300px;gap:12px;margin-bottom:12px}
.cd{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rd);padding:14px;position:relative;overflow:hidden}
.cd::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(196,90,44,0.2),transparent)}
.ct{font-family:'Space Grotesk';font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.dt{width:5px;height:5px;border-radius:50%;display:inline-block}
.gw{position:relative;border-radius:8px;overflow:hidden;background:#020204}
#gc{width:100%;height:500px;cursor:grab}#gc:active{cursor:grabbing}
.ghud{position:absolute;top:8px;left:8px;display:flex;gap:4px;z-index:10;flex-wrap:wrap}
.gb{padding:3px 10px;border-radius:5px;font-size:10px;border:1px solid var(--bd);background:rgba(5,5,9,0.85);color:var(--tx2);cursor:pointer;font-family:'Space Grotesk';transition:all .15s;backdrop-filter:blur(6px)}
.gb.on{border-color:var(--ms);color:var(--ms2)}.gb:hover{border-color:var(--ms2)}
.gi{position:absolute;bottom:8px;left:8px;font-family:'JetBrains Mono';font-size:11px;color:var(--ms2);background:rgba(5,5,9,0.85);padding:3px 8px;border-radius:5px;z-index:10;backdrop-filter:blur(6px)}
.ld{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;font-family:'Space Grotesk';font-size:14px;color:var(--ms2);z-index:20;background:var(--bg)}
.sp{width:30px;height:30px;border:3px solid var(--bd);border-top-color:var(--ms2);border-radius:50%;animation:spn 1s linear infinite}
@keyframes spn{to{transform:rotate(360deg)}}
.sr{display:flex;align-items:center;gap:8px;margin-top:8px}
.sol{flex:1;height:3px;-webkit-appearance:none;background:var(--sf2);border-radius:2px;outline:none}
.sol::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--ms2);cursor:pointer;border:2px solid var(--bg)}
.sll{font-size:10px;color:var(--tx3);font-family:'JetBrains Mono';min-width:55px}
.wl{max-height:510px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;padding-right:4px}
.wl::-webkit-scrollbar{width:3px}.wl::-webkit-scrollbar-thumb{background:var(--sf2);border-radius:2px}
.wi{padding:8px 10px;border-radius:7px;border:1px solid var(--bd);cursor:pointer;transition:all .15s;background:var(--sf2);font-size:11px}
.wi:hover,.wi.on{border-color:var(--ms);background:rgba(232,147,74,0.08)}
.wn{font-family:'Space Grotesk';font-weight:600;font-size:12px;margin-bottom:1px}
.wm{color:var(--tx3);font-family:'JetBrains Mono';font-size:9px}
.wt{display:inline-block;font-size:8px;padding:1px 5px;border-radius:3px;margin-top:3px;margin-right:2px}
.wt.ai{border:1px solid rgba(129,140,248,0.3);color:var(--ac);background:rgba(129,140,248,0.08)}
.wt.sa{border:1px solid rgba(52,211,153,0.3);color:var(--em);background:rgba(52,211,153,0.08)}
.wt.sc{border:1px solid rgba(251,191,36,0.2);color:var(--am);background:rgba(251,191,36,0.06)}
.bg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
canvas.ch{display:block;width:100%;height:140px}
@media(max-width:900px){.mg,.bg{grid-template-columns:1fr}.top{grid-template-columns:repeat(3,1fr)}#gc{height:360px}}
</style>
</head>
<body>
<div class="app">
<header><div><div class="logo"><div class="logo-d"></div>PersExplorer<span class="bdg">NASA/JPL Mars 2020</span></div></div>
<div class="hs"><span>Sol: <strong id="hS">—</strong></span><span>Traverse: <strong id="hD">—</strong></span><span>Samples: <strong id="hA">—</strong></span></div></header>
<div class="top" id="tp"></div>
<div class="mg">
<div class="cd">
<div class="ct"><span class="dt" style="background:var(--ms2)"></span>Mars 3D globe — drag to rotate, scroll to zoom</div>
<div class="gw"><div id="gc"><div class="ld" id="ldE"><div class="sp"></div>Loading Mars texture...<div style="font-size:11px;color:var(--tx3)" id="ldS">NASA imagery</div></div></div>
<div class="ghud">
<button class="gb on" id="bR" onclick="tR()">Auto-rotate</button>
<button class="gb" onclick="fJ()">Fly to Jezero</button>
<button class="gb" onclick="rV()">Reset</button>
<button class="gb on" id="bM" onclick="tM()">Markers</button>
<button class="gb on" id="bP" onclick="tP()">Rover path</button>
</div>
<div class="gi" id="gI">Drag to explore Mars</div></div>
<div class="sr"><span class="sll">Sol 0</span><input type="range" class="sol" id="sS" min="0" max="1800" value="1800" step="1"><span class="sll" style="text-align:right" id="sO">Sol 1800</span></div>
</div>
<div class="cd" style="display:flex;flex-direction:column"><div class="ct"><span class="dt" style="background:var(--cy)"></span>Waypoints</div><div class="wl" id="wl"></div></div>
</div>
<div class="bg">
<div class="cd"><div class="ct"><span class="dt" style="background:var(--em)"></span>Elevation profile</div><canvas class="ch" id="eC"></canvas></div>
<div class="cd"><div class="ct"><span class="dt" style="background:var(--am)"></span>Drive rate (m/sol)</div><canvas class="ch" id="dC"></canvas></div>
<div class="cd"><div class="ct"><span class="dt" style="background:var(--ac)"></span>AI vs human planning</div><canvas class="ch" id="cC"></canvas></div>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const WP=[
{sol:0,name:"Landing site",lat:18.4447,lon:77.4508,elev:-2501,dist:0,note:"Touchdown Feb 18 2021",type:"landing"},
{sol:14,name:"First drive",lat:18.4449,lon:77.4511,elev:-2502,dist:6.5,note:"First 6.5m test",type:"milestone"},
{sol:61,name:"Wright Brothers Field",lat:18.444,lon:77.4497,elev:-2498,dist:68,note:"Ingenuity first flight",type:"milestone"},
{sol:164,name:"Rochette",lat:18.4388,lon:77.4443,elev:-2508,dist:715,note:"First rock core",type:"sample"},
{sol:194,name:"Brac",lat:18.4378,lon:77.4435,elev:-2505,dist:890,note:"Igneous rock",type:"sample"},
{sol:261,name:"Issole",lat:18.4365,lon:77.4415,elev:-2512,dist:1200,note:"Sedimentary",type:"sample"},
{sol:342,name:"Three Forks depot",lat:18.434,lon:77.439,elev:-2509,dist:1850,note:"Sample cache",type:"milestone"},
{sol:415,name:"Hawksbill Gap",lat:18.4305,lon:77.4358,elev:-2496,dist:2350,note:"Delta front",type:"science"},
{sol:520,name:"Skinner Ridge",lat:18.4275,lon:77.432,elev:-2465,dist:3200,note:"Layered sediments",type:"science"},
{sol:560,name:"Wildcat Ridge",lat:18.426,lon:77.4305,elev:-2458,dist:3500,note:"Organics detected",type:"science"},
{sol:600,name:"Lefroy Bay",lat:18.4248,lon:77.429,elev:-2450,dist:3780,note:"Hydrated silica",type:"sample"},
{sol:650,name:"Otis Peak",lat:18.4235,lon:77.4275,elev:-2442,dist:4100,note:"Carbonate",type:"sample"},
{sol:705,name:"Delta top",lat:18.4218,lon:77.4258,elev:-2430,dist:4500,note:"Top of delta",type:"milestone"},
{sol:920,name:"Pico Turquino",lat:18.4172,lon:77.4208,elev:-2420,dist:5800,note:"Altered olivine",type:"sample"},
{sol:1140,name:"Bunsen Peak",lat:18.412,lon:77.415,elev:-2365,dist:7800,note:"Possible biosignature",type:"sample"},
{sol:1200,name:"Cheyava Falls",lat:18.4108,lon:77.4135,elev:-2350,dist:8200,note:"Organic markers",type:"science"},
{sol:1400,name:"Northern rim",lat:18.4068,lon:77.4085,elev:-2335,dist:10500,note:"Rim geology",type:"science"},
{sol:1600,name:"Lookout Point",lat:18.4035,lon:77.4045,elev:-2290,dist:13200,note:"Panoramic campaign",type:"science"},
{sol:1707,name:"AI Drive 1",lat:18.402,lon:77.4028,elev:-2280,dist:14100,note:"Claude planned 210m",type:"ai"},
{sol:1709,name:"AI Drive 2",lat:18.4015,lon:77.402,elev:-2275,dist:14346,note:"Claude planned 246m",type:"ai"},
{sol:1800,name:"Current position",lat:18.3995,lon:77.399,elev:-2260,dist:15200,note:"Active on rim",type:"milestone"}
];

let maxSol=1800,selWP=null,aRot=true,sMk=true,sPth=true;
const $=id=>document.getElementById(id);

const gc=$('gc'),sc=new THREE.Scene();
const cam=new THREE.PerspectiveCamera(45,gc.clientWidth/gc.clientHeight,0.1,1000);
cam.position.z=3;
const ren=new THREE.WebGLRenderer({antialias:true,alpha:true});
ren.setSize(gc.clientWidth,gc.clientHeight);
ren.setPixelRatio(Math.min(devicePixelRatio,2));
gc.appendChild(ren.domElement);

const al=new THREE.AmbientLight(0x666666,0.6);sc.add(al);
const dl=new THREE.DirectionalLight(0xfff0dd,1.5);dl.position.set(5,2,5);sc.add(dl);
const fl=new THREE.DirectionalLight(0x556677,0.2);fl.position.set(-3,-1,-3);sc.add(fl);

// Stars
const sG=new THREE.BufferGeometry(),sA=new Float32Array(6000);
for(let i=0;i<6000;i++)sA[i]=(Math.random()-.5)*150;
sG.setAttribute('position',new THREE.BufferAttribute(sA,3));
sc.add(new THREE.Points(sG,new THREE.PointsMaterial({color:0xffffff,size:0.035,sizeAttenuation:true})));

// Mars sphere
const marsGeo=new THREE.SphereGeometry(1,256,256);
const loader=new THREE.TextureLoader();

// Try loading texture from multiple sources
// Priority: 1) local mars.jpg  2) CDN sources  3) procedural fallback
const URLS=[
'mars.jpg',
'mars_texture.jpg',
'https://unpkg.com/three-globe@2.34.0/example/img/mars-water.png',
'https://cdn.jsdelivr.net/npm/three-globe@2.34.0/example/img/mars-water.png',
'https://unpkg.com/three-globe@2.31.0/example/img/mars-water.png',
'https://cdn.jsdelivr.net/npm/three-globe/example/img/mars-water.png'
];

const BUMP_URLS=[
'mars_bump.jpg',
'mars_normal.jpg',
'https://unpkg.com/three-globe@2.34.0/example/img/mars-topology.png',
'https://cdn.jsdelivr.net/npm/three-globe@2.34.0/example/img/mars-topology.png',
'https://unpkg.com/three-globe/example/img/mars-topology.png'
];

let marsMesh=null;

function tryLoad(urls,idx,cb){
if(idx>=urls.length){cb(null);return;}
$('ldS').textContent=`Trying source ${idx+1}/${urls.length}...`;
loader.load(urls[idx],
tex=>{tex.anisotropy=ren.capabilities.getMaxAnisotropy();cb(tex)},
undefined,
()=>tryLoad(urls,idx+1,cb)
);
}

function buildMars(colorTex,bumpTex){
const mat=new THREE.MeshPhongMaterial({
map:colorTex,
bumpMap:bumpTex||null,
bumpScale:bumpTex?0.04:0,
specular:new THREE.Color(0x111111),
shininess:5
});
marsMesh=new THREE.Mesh(marsGeo,mat);
marsMesh.rotation.y=-Math.PI*0.5;
sc.add(marsMesh);

// Atmosphere
const atMat=new THREE.ShaderMaterial({
vertexShader:'varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
fragmentShader:'varying vec3 vN;void main(){float i=pow(0.6-dot(vN,vec3(0,0,1)),2.0);gl_FragColor=vec4(0.9,0.55,0.3,1)*i*0.3;}',
side:THREE.BackSide,blending:THREE.AdditiveBlending,transparent:true
});
sc.add(new THREE.Mesh(new THREE.SphereGeometry(1.02,64,64),atMat));

buildMk();uPath();
$('ldE').style.display='none';
}

// Load textures
let cTex=null,bTex=null;
tryLoad(URLS,0,tex=>{
if(tex){
cTex=tex;
$('ldS').textContent='Loading bump map...';
tryLoad(BUMP_URLS,0,bt=>{bTex=bt;buildMars(cTex,bTex)});
}else{
$('ldS').textContent='No texture found. Add mars.jpg to repo.';
// Create a simple colored material as fallback
const fallbackMat=new THREE.MeshPhongMaterial({color:0xc45a2c,specular:0x111111,shininess:5});
marsMesh=new THREE.Mesh(marsGeo,fallbackMat);
sc.add(marsMesh);
const atMat=new THREE.ShaderMaterial({
vertexShader:'varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
fragmentShader:'varying vec3 vN;void main(){float i=pow(0.6-dot(vN,vec3(0,0,1)),2.0);gl_FragColor=vec4(0.9,0.55,0.3,1)*i*0.3;}',
side:THREE.BackSide,blending:THREE.AdditiveBlending,transparent:true
});
sc.add(new THREE.Mesh(new THREE.SphereGeometry(1.02,64,64),atMat));
buildMk();uPath();
$('ldE').style.display='none';
}
});

// Groups
const mkG=new THREE.Group(),pG=new THREE.Group();sc.add(mkG);sc.add(pG);

function ll2v(la,lo,r){const p=(90-la)*Math.PI/180,t=(lo+180)*Math.PI/180;return new THREE.Vector3(-r*Math.sin(p)*Math.cos(t),r*Math.cos(p),r*Math.sin(p)*Math.sin(t))}

function buildMk(){
while(mkG.children.length)mkG.remove(mkG.children[0]);
if(!sMk)return;
const LM=[{n:"Olympus Mons",la:18.65,lo:-133.8},{n:"Valles Marineris",la:-14,lo:-59},{n:"Hellas Basin",la:-42.4,lo:70.5},{n:"Gale Crater",la:-5.4,lo:137.8},{n:"Jezero Crater",la:18.38,lo:77.58,hl:1},{n:"Elysium Mons",la:25,lo:147},{n:"Utopia Planitia",la:46,lo:110}];
LM.forEach(lm=>{
const pos=ll2v(lm.la,lm.lo,1.008);
if(lm.hl){
const dot=new THREE.Mesh(new THREE.SphereGeometry(0.012,16,16),new THREE.MeshBasicMaterial({color:0x22d3ee}));
dot.position.copy(pos);dot.userData={hl:1};mkG.add(dot);
[0.022,0.036].forEach((r,i)=>{
const rg=new THREE.Mesh(new THREE.RingGeometry(r,r+0.005,32),new THREE.MeshBasicMaterial({color:0x22d3ee,transparent:true,opacity:i?0.15:0.45,side:THREE.DoubleSide}));
rg.position.copy(pos);rg.lookAt(0,0,0);rg.userData={pls:1,i};mkG.add(rg);
});
}else{
const dot=new THREE.Mesh(new THREE.SphereGeometry(0.004,8,8),new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.35}));
dot.position.copy(pos);mkG.add(dot);
}
});
}

function uPath(){
while(pG.children.length)pG.remove(pG.children[0]);
if(!sPth)return;
const vis=WP.filter(w=>w.sol<=maxSol);if(vis.length<2)return;
try{
const pts=vis.map(w=>ll2v(w.lat,w.lon,1.01));
const crv=new THREE.CatmullRomCurve3(pts);
pG.add(new THREE.Mesh(new THREE.TubeGeometry(crv,vis.length*5,0.0025,8,false),new THREE.MeshBasicMaterial({color:0xe8934a,transparent:true,opacity:0.9})));
pG.add(new THREE.Mesh(new THREE.TubeGeometry(crv,vis.length*5,0.008,8,false),new THREE.MeshBasicMaterial({color:0xe8934a,transparent:true,opacity:0.1})));
const aiW=vis.filter(w=>w.type==='ai');
if(aiW.length>=2){
const pi=WP.indexOf(aiW[0])-1;
const ap=[ll2v(WP[Math.max(0,pi)].lat,WP[Math.max(0,pi)].lon,1.012),...aiW.map(w=>ll2v(w.lat,w.lon,1.012))];
const ac=new THREE.CatmullRomCurve3(ap);
pG.add(new THREE.Mesh(new THREE.TubeGeometry(ac,20,0.004,8,false),new THREE.MeshBasicMaterial({color:0x818cf8})));
pG.add(new THREE.Mesh(new THREE.TubeGeometry(ac,20,0.012,8,false),new THREE.MeshBasicMaterial({color:0x818cf8,transparent:true,opacity:0.12})));
}
}catch(e){}
vis.forEach(w=>{
const p=ll2v(w.lat,w.lon,1.013);
const cl={landing:0x22d3ee,milestone:0xe8934a,science:0xfbbf24,sample:0x34d399,ai:0x818cf8};
const sz=w===selWP?0.007:0.004;
const dt=new THREE.Mesh(new THREE.SphereGeometry(sz,8,8),new THREE.MeshBasicMaterial({color:cl[w.type]||0xe8934a}));
dt.position.copy(p);dt.userData={wp:w};pG.add(dt);
});
}

// Controls
let drg=false,pm={x:0,y:0},rX=0.3,rY=0,tX=0.3,tY=0,zm=3,tZ=3;
const el=ren.domElement;
el.addEventListener('pointerdown',e=>{drg=true;aRot=false;$('bR').classList.remove('on');pm={x:e.clientX,y:e.clientY};el.setPointerCapture(e.pointerId)});
el.addEventListener('pointerup',e=>{drg=false;el.releasePointerCapture(e.pointerId)});
el.addEventListener('pointermove',e=>{if(!drg)return;tY+=(e.clientX-pm.x)*.005;tX=Math.max(-1.5,Math.min(1.5,tX+(e.clientY-pm.y)*.005));pm={x:e.clientX,y:e.clientY}});
el.addEventListener('wheel',e=>{e.preventDefault();tZ=Math.max(1.3,Math.min(8,tZ+e.deltaY*.002))},{passive:false});
let ts=null,tsd=null;
el.addEventListener('touchstart',e=>{if(e.touches.length===1){ts={x:e.touches[0].clientX,y:e.touches[0].clientY};aRot=false;$('bR').classList.remove('on')}if(e.touches.length===2){tsd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY)}},{passive:true});
el.addEventListener('touchmove',e=>{if(ts&&e.touches.length===1){tY+=(e.touches[0].clientX-ts.x)*.005;tX=Math.max(-1.5,Math.min(1.5,tX+(e.touches[0].clientY-ts.y)*.005));ts={x:e.touches[0].clientX,y:e.touches[0].clientY}}if(e.touches.length===2&&tsd){const nd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);tZ=Math.max(1.3,Math.min(8,tZ-(nd-tsd)*.01));tsd=nd}},{passive:true});
el.addEventListener('touchend',()=>{ts=null;tsd=null});

const rc=new THREE.Raycaster(),mp=new THREE.Vector2();
el.addEventListener('click',e=>{
const r=el.getBoundingClientRect();mp.x=((e.clientX-r.left)/r.width)*2-1;mp.y=-((e.clientY-r.top)/r.height)*2+1;
rc.setFromCamera(mp,cam);
const mh=rc.intersectObjects(mkG.children);if(mh.length&&mh[0].object.userData.hl){fJ();return}
const ph=rc.intersectObjects(pG.children);if(ph.length&&ph[0].object.userData.wp){selWP=ph[0].object.userData.wp;uPath();rWL();dE()}
});

function fJ(){tX=18.38*Math.PI/180;tY=-(77.58+90)*Math.PI/180;tZ=1.8;$('gI').textContent='Jezero Crater'}
window.fJ=fJ;
function rV(){tX=0.3;tY=0;tZ=3;$('gI').textContent='Drag to explore Mars'}
window.rV=rV;
function tR(){aRot=!aRot;$('bR').classList.toggle('on',aRot)}
window.tR=tR;
function tM(){sMk=!sMk;$('bM').classList.toggle('on',sMk);buildMk()}
window.tM=tM;
function tP(){sPth=!sPth;$('bP').classList.toggle('on',sPth);uPath()}
window.tP=tP;

let t=0;
function anim(){
requestAnimationFrame(anim);t+=.01;
if(aRot)tY+=.0015;
rX+=(tX-rX)*.06;rY+=(tY-rY)*.06;zm+=(tZ-zm)*.06;
if(marsMesh){marsMesh.rotation.x=rX;marsMesh.rotation.y=rY}
mkG.rotation.x=rX;mkG.rotation.y=rY;pG.rotation.x=rX;pG.rotation.y=rY;
cam.position.z=zm;
mkG.children.forEach(c=>{if(c.userData.pls){const s=1+Math.sin(t*3+c.userData.i)*.2;c.scale.set(s,s,s)}});
ren.render(sc,cam);
}
anim();

window.addEventListener('resize',()=>{const w=gc.clientWidth,h=gc.clientHeight;cam.aspect=w/h;cam.updateProjectionMatrix();ren.setSize(w,h)});

// Stats
function uS(){
const vis=WP.filter(w=>w.sol<=maxSol),last=vis[vis.length-1];
$('hS').textContent='Sol '+last.sol;$('hD').textContent=(last.dist/1000).toFixed(1)+' km';$('hA').textContent=WP.filter(w=>w.type==='sample'&&w.sol<=maxSol).length;
$('tp').innerHTML=[{v:(last.dist/1000).toFixed(1)+' km',l:'Total traverse',c:'var(--ms2)'},{v:last.sol,l:'Mission sols',c:'var(--cy)'},{v:WP.filter(w=>w.type==='sample'&&w.sol<=maxSol).length,l:'Rock samples',c:'var(--em)'},{v:last.elev+' m',l:'Elevation',c:'var(--am)'},{v:'455.9 m',l:'AI-driven',c:'var(--ac)'}].map(s=>`<div class="st"><div class="sv" style="color:${s.c}">${s.v}</div><div class="sl">${s.l}</div></div>`).join('');
}
function rWL(){
const l=$('wl');l.innerHTML='';
[...WP].filter(w=>w.sol<=maxSol).reverse().forEach(wp=>{
const d=document.createElement('div');d.className='wi'+(wp===selWP?' on':'');
const cc={landing:'var(--cy)',milestone:'var(--ms2)',science:'var(--am)',sample:'var(--em)',ai:'var(--ac)'};
let tg='';if(wp.type==='ai')tg='<span class="wt ai">AI (Claude)</span>';if(wp.type==='sample')tg='<span class="wt sa">Sample</span>';if(wp.type==='science')tg='<span class="wt sc">Science</span>';
d.innerHTML=`<div class="wn" style="color:${cc[wp.type]}">${wp.name}</div><div class="wm">Sol ${wp.sol} · ${(wp.dist/1000).toFixed(1)}km · ${wp.elev}m</div>${tg}`;
d.onclick=()=>{selWP=wp;uPath();rWL();dE();const p=ll2v(wp.lat,wp.lon,1);tX=Math.asin(p.y);tY=Math.atan2(p.x,-p.z)+Math.PI/2;tZ=1.8};
l.appendChild(d);
});
}
function rsC(c){const r=c.getBoundingClientRect(),d=devicePixelRatio||1;c.width=r.width*d;c.height=r.height*d;c.style.width=r.width+'px';c.style.height=r.height+'px';return{w:r.width,h:r.height,d}}
function dE(){
const c=$('eC'),{w,h,d}=rsC(c),cx=c.getContext('2d');cx.setTransform(d,0,0,d,0,0);cx.clearRect(0,0,w,h);
const vis=WP.filter(w=>w.sol<=maxSol);if(!vis.length)return;
const p={l:36,r:8,t:6,b:20},pw=w-p.l-p.r,ph=h-p.t-p.b;
const es=vis.map(v=>v.elev),mE=Math.min(...es)-10,xE=Math.max(...es)+10,xD=Math.max(...vis.map(v=>v.dist),1);
cx.beginPath();vis.forEach((wp,i)=>{const x=p.l+pw*(wp.dist/xD),y=p.t+ph*(1-(wp.elev-mE)/(xE-mE));i?cx.lineTo(x,y):cx.moveTo(x,y)});cx.lineTo(p.l+pw,p.t+ph);cx.lineTo(p.l,p.t+ph);cx.closePath();
const gr=cx.createLinearGradient(0,p.t,0,p.t+ph);gr.addColorStop(0,'rgba(232,147,74,0.2)');gr.addColorStop(1,'rgba(232,147,74,0)');cx.fillStyle=gr;cx.fill();
cx.beginPath();vis.forEach((wp,i)=>{const x=p.l+pw*(wp.dist/xD),y=p.t+ph*(1-(wp.elev-mE)/(xE-mE));i?cx.lineTo(x,y):cx.moveTo(x,y)});cx.strokeStyle='rgba(232,147,74,0.8)';cx.lineWidth=1.5;cx.stroke();
if(selWP&&selWP.sol<=maxSol){const x=p.l+pw*(selWP.dist/xD),y=p.t+ph*(1-(selWP.elev-mE)/(xE-mE));cx.beginPath();cx.arc(x,y,4,0,Math.PI*2);cx.fillStyle='#fff';cx.fill()}
cx.fillStyle='#475569';cx.font='9px JetBrains Mono';cx.textAlign='right';cx.fillText(xE+'m',p.l-3,p.t+8);cx.fillText(mE+'m',p.l-3,p.t+ph);
}
function dD(){
const c=$('dC'),{w,h,d}=rsC(c),cx=c.getContext('2d');cx.setTransform(d,0,0,d,0,0);cx.clearRect(0,0,w,h);
const vis=WP.filter(w=>w.sol<=maxSol),p={l:30,r:8,t:6,b:16},pw=w-p.l-p.r,ph=h-p.t-p.b;
const dr=[];for(let i=1;i<vis.length;i++){const dd=vis[i].dist-vis[i-1].dist,ds=vis[i].sol-vis[i-1].sol;dr.push({r:ds>0?dd/ds:0,t:vis[i].type})}
if(!dr.length)return;const mx=Math.max(...dr.map(d=>d.r),1),bw=Math.max(3,pw/dr.length-1);
dr.forEach((d,i)=>{const x=p.l+pw*i/dr.length,bh=d.r/mx*ph;cx.fillStyle=d.t==='ai'?'rgba(129,140,248,0.8)':d.t==='sample'?'rgba(52,211,153,0.6)':'rgba(232,147,74,0.5)';cx.beginPath();cx.roundRect(x,p.t+ph-bh,bw,bh,[2,2,0,0]);cx.fill()});
}
function dCC(){
const c=$('cC'),{w,h,d}=rsC(c),cx=c.getContext('2d');cx.setTransform(d,0,0,d,0,0);cx.clearRect(0,0,w,h);
const p={l:6,r:6,t:4,b:4},pw=w-p.l-p.r;
[{l:'Planning',h:'~4hr',a:'~15min',hp:.93,ap:.07},{l:'Dec 8',h:'150m',a:'210m',hp:.42,ap:.58},{l:'Dec 10',h:'180m',a:'246m',hp:.42,ap:.58},{l:'Hazards',h:'Manual',a:'VLM',hp:.5,ap:.5},{l:'Efficiency',h:'Safe',a:'Optimal',hp:.45,ap:.55}].forEach((d,i)=>{const y=p.t+i*24;
cx.fillStyle='#64748b';cx.font='10px DM Sans';cx.textAlign='left';cx.fillText(d.l,p.l,y+9);
const by=y+13,bh=4;cx.fillStyle='rgba(232,147,74,0.45)';cx.beginPath();cx.roundRect(p.l,by,pw*d.hp,bh,[2,0,0,2]);cx.fill();
cx.fillStyle='rgba(129,140,248,0.65)';cx.beginPath();cx.roundRect(p.l+pw*(1-d.ap),by,pw*d.ap,bh,[0,2,2,0]);cx.fill();
cx.font='8px JetBrains Mono';cx.fillStyle='#94a3b8';cx.textAlign='left';cx.fillText(d.h,p.l,by+12);cx.textAlign='right';cx.fillText(d.a,p.l+pw,by+12)});
const ly=p.t+5*24;cx.fillStyle='rgba(232,147,74,0.5)';cx.fillRect(p.l,ly,8,8);cx.fillStyle='#94a3b8';cx.font='9px DM Sans';cx.textAlign='left';cx.fillText('Human',p.l+11,ly+8);
cx.fillStyle='rgba(129,140,248,0.6)';cx.fillRect(p.l+60,ly,8,8);cx.fillText('Claude AI',p.l+71,ly+8);
}
$('sS').addEventListener('input',e=>{maxSol=+e.target.value;$('sO').textContent='Sol '+maxSol;uS();uPath();rWL();dE();dD()});
function init(){uS();rWL();dE();dD();dCC()}
window.addEventListener('resize',()=>{dE();dD();dCC()});
init();
</script>
